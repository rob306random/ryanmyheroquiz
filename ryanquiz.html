<script>

function beep(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();

    o.type = "sine";
    o.connect(g);
    g.connect(ctx.destination);

    let duration = 0.12;

    if (type === "correct") {
        o.frequency.setValueAtTime(520, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(780, ctx.currentTime + 0.12);
        duration = 0.15;
    }

    if (type === "wrong") {
        o.frequency.setValueAtTime(180, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.15);
        duration = 0.18;
    }

    if (type === "click") {
        o.frequency.setValueAtTime(420, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(360, ctx.currentTime + 0.08);
        duration = 0.08;
    }

    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

    o.start();
    o.stop(ctx.currentTime + duration);
}

function similarity(a, b) {
    a = a.toLowerCase();
    b = b.toLowerCase();

    let matrix = Array.from({ length: b.length + 1 }, () =>
        Array(a.length + 1).fill(0)
    );

    for (let i = 0; i <= a.length; i++) matrix[0][i] = i;
    for (let j = 0; j <= b.length; j++) matrix[j][0] = j;

    for (let j = 1; j <= b.length; j++) {
        for (let i = 1; i <= a.length; i++) {
            if (b[j - 1] === a[i - 1]) {
                matrix[j][i] = matrix[j - 1][i - 1];
            } else {
                matrix[j][i] = Math.min(
                    matrix[j - 1][i - 1] + 1,
                    matrix[j][i - 1] + 1,
                    matrix[j - 1][i] + 1
                );
            }
        }
    }

    let dist = matrix[b.length][a.length];
    return 1 - dist / Math.max(a.length, b.length);
}

let shuffled = [];
let index = 0;
let score = 0;
let answered = false;
let results = [];
let finished = false;

function startGame() {
    document.getElementById("splash").style.display = "none";
    startQuiz();
}

function shuffle(a){
    for(let i=a.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
}

function startQuiz() {
    shuffled = [...characters];
    shuffle(shuffled);
    index = 0;
    score = 0;
    results = [];
    finished = false;

    document.getElementById("topbar").style.display = "flex";

    loadQuestion();
    updateTopbar();
}

function loadQuestion() {
    if (finished) return;
    if (index >= shuffled.length) return endQuiz();

    answered = false;

    document.getElementById("endScreen").classList.add("hidden");
    document.getElementById("characterImage").classList.remove("hidden");
    document.getElementById("answerInput").classList.remove("hidden");
    document.getElementById("submitBtn").classList.remove("hidden");
    document.getElementById("nextBtn").classList.add("hidden");

    document.getElementById("result").textContent = "";
    document.getElementById("answerInput").value = "";
    document.getElementById("characterImage").src = shuffled[index].image;
    document.getElementById("answerInput").focus();
}

document.getElementById("answerInput").addEventListener("keydown", function(e){
    if(e.key === "Enter") submitAnswer();
});

function submitAnswer() {
    if (answered || finished) return;

    const input = document.getElementById("answerInput").value.trim();
    const correct = shuffled[index].ryanName;

    if (input === "") {
        results.push({ image: shuffled[index].image, correct, user: "Skipped", result: false });
        beep("wrong");
        showResult("Skipped! Ryan calls this: " + correct, false);
        answered = true;
        document.getElementById("nextBtn").classList.remove("hidden");
        return;
    }

    const sim = similarity(input, correct);
    const isCorrect = sim >= 0.75;

    if (isCorrect) {
        score++;
        beep("correct");
        showResult("Correct!", true);
    } else {
        beep("wrong");
        showResult("Wrong! Ryan calls this: " + correct, false);
    }

    results.push({
        image: shuffled[index].image,
        correct,
        user: input,
        result: isCorrect
    });

    answered = true;
    updateTopbar();
    document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion() {
    if (finished) return;
    index++;
    loadQuestion();
    updateTopbar();
}

function showResult(t,c){
    const r=document.getElementById("result");
    r.textContent=t;
    r.className="result "+(c?"correct":"wrong");
}

function updateTopbar(){
    document.getElementById("progress").textContent =
        Math.min(index + 1, shuffled.length) + " / " + shuffled.length;
    document.getElementById("score").textContent = "Score: " + score;
}

function endQuiz() {
    finished = true;
    answered = true;

    document.getElementById("characterImage").classList.add("hidden");
    document.getElementById("answerInput").classList.add("hidden");
    document.getElementById("submitBtn").classList.add("hidden");
    document.getElementById("nextBtn").classList.add("hidden");
    document.getElementById("topbar").style.display = "none";

    document.getElementById("result").textContent = "";

    // IMPORTANT FIX: do NOT modify h2 anymore
    document.getElementById("endScreen").classList.remove("hidden");
    document.getElementById("finalScore").textContent =
        "You got " + score + " / " + shuffled.length;
}

function showResults() {
    const d = document.getElementById("breakdown");
    d.classList.remove("hidden");
    d.innerHTML = "<h3>Results Breakdown</h3>";

    results.forEach(r => {
        d.innerHTML += `
        <div style="display:flex;align-items:center;gap:10px;margin:10px 0;background:#2a2d36;padding:10px;border-radius:10px;">
            <img src="${r.image}" style="width:60px;height:60px;object-fit:contain;">
            <div style="text-align:left;">
                <div><b>Correct:</b> ${r.correct}</div>
                <div><b>Your answer:</b> ${r.user}</div>
                <div style="color:${r.result ? '#22c55e' : '#ef4444'}">
                    ${r.result ? "Correct" : "Wrong"}
                </div>
            </div>
        </div>`;
    });
}

function restartQuiz(){
    location.reload();
}

</script>
